name: APK Workflow

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 11 * * *' # Every day at 11 AM UTC
  workflow_dispatch: # Manual run

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Download tools
        run: |
          # Function to get latest release download URL
          get_latest_url() {
            curl -s "https://api.github.com/repos/$1/releases/latest" | grep "browser_download_url.*\.jar" | head -n 1 | cut -d '"' -f 4
          }

          APKTOOL_URL=$(get_latest_url "iBotPeaches/Apktool")
          UBER_SIGNER_URL=$(get_latest_url "patrickfav/uber-apk-signer")
          APKEDITOR_URL=$(get_latest_url "REAndroid/APKEditor")

          echo "Downloading Apktool from $APKTOOL_URL"
          wget "$APKTOOL_URL" -O apktool.jar
          
          echo "Downloading Uber APK Signer from $UBER_SIGNER_URL"
          wget "$UBER_SIGNER_URL" -O uber-apk-signer.jar
          
          echo "Downloading APKEditor from $APKEDITOR_URL"
          wget "$APKEDITOR_URL" -O APKEditor.jar

          # Create a wrapper for apktool to be used as 'apktool' in the script
          echo '#!/bin/bash' > apktool
          echo 'java -jar "$GITHUB_WORKSPACE/apktool.jar" "$@"' >> apktool
          chmod +x apktool
          sudo mv apktool /usr/local/bin/apktool

      - name: Run APK modification script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python process_apks.py
